<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JJK Domain Expansion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      height: 100vh;
      overflow: hidden;
    }

    /* Webcam — small top-left corner */
    .container {
      position: fixed;
      top: 16px;
      left: 16px;
      width: 220px;
      height: 165px;
      z-index: 10;
      border: 1px solid rgba(255,60,60,0.4);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255,0,0,0.2);
    }

    video {
      position: absolute;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      object-fit: cover;
    }

    canvas {
      position: absolute;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }

    /* Gesture label — centred bottom */
    #gesture-label {
      position: fixed;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      color: #ff3333;
      font-size: 26px;
      font-weight: 900;
      font-family: 'Georgia', serif;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 30px #ff0000, 0 0 60px #ff000088;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      z-index: 20;
    }
  </style>
</head>
<body>

  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>

  <div id="gesture-label"></div>

  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="gesture.js"></script>
  <script src="effects.js"></script>

  <script>
    const video  = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const ctx    = canvas.getContext('2d');

    canvas.width  = 640;
    canvas.height = 480;

    const hands = new Hands({
      locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
      maxNumHands: 2,
      modelComplexity: 1,
      minDetectionConfidence: 0.7,
      minTrackingConfidence: 0.5
    });

    hands.onResults(onResults);

    const camera = new Camera(video, {
      onFrame: async () => { await hands.send({ image: video }); },
      width: 640,
      height: 480
    });
    camera.start();

    function onResults(results) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (!results.multiHandLandmarks) return;

      for (const landmarks of results.multiHandLandmarks) {
        drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#ff4444', lineWidth: 1.5 });
        drawLandmarks(ctx, landmarks, { color: '#ffffff', fillColor: '#ff0000', lineWidth: 1, radius: 3 });

        classifyWithDebounce(landmarks, (gesture) => {
          console.log('Detected:', gesture);
          showGestureLabel(gesture);
          triggerDomainExpansion(gesture);
        });
      }
    }

    function showGestureLabel(gesture) {
      const label = document.getElementById('gesture-label');
      const names = {
        malevolent_shrine: '呪術廻戦  ·  Malevolent Shrine',
        unlimited_void:    '∞  ·  Unlimited Void',
        chimera_shadow:    '十種影法術  ·  Chimera Shadow Garden',
        time_strike:       '獄門疆  ·  Prison Realm'
      };
      label.textContent = names[gesture] || gesture;
      label.style.opacity = '1';
      clearTimeout(label._timer);
      label._timer = setTimeout(() => label.style.opacity = '0', 3000);
    }
  </script>
</body>
</html>
