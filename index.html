<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>JJK Domain Expansion</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; height: 100vh; overflow: hidden; }

    .container {
      position: fixed;
      top: 16px; left: 16px;
      width: 220px; height: 165px;
      z-index: 10;
      border: 1px solid rgba(255,60,60,0.4);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(255,0,0,0.2);
    }

    video {
      position: absolute;
      width: 100%; height: 100%;
      transform: scaleX(-1);
      object-fit: cover;
    }

    canvas {
      position: absolute;
      width: 100%; height: 100%;
      transform: scaleX(-1);
    }

    #gesture-label {
      position: fixed;
      bottom: 48px; left: 50%;
      transform: translateX(-50%);
      color: #ff3333;
      font-size: 26px; font-weight: 900;
      font-family: 'Georgia', serif;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-shadow: 0 0 30px #ff0000, 0 0 60px #ff000088;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s ease;
      white-space: nowrap;
      z-index: 20;
    }
  </style>
</head>
<body>
  <div class="container">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="gesture-label"></div>

<!-- Three.js FIRST -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<!-- MediaPipe with pinned versions -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils@0.3.1620248257/drawing_utils.js" crossorigin="anonymous"></script>

<!-- Your files -->
<script src="gesture.js"></script>
<script src="effects.js"></script>
<script src="void.js"></script>
<script src="mal.js"></script>
<script src="chimera.js"></script>
<script src="time.js"></script>

<script>
const video  = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = video.videoWidth  || 640;
  canvas.height = video.videoHeight || 480;
}

const hands = new Hands({
  locateFile: file =>
    `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.5
});

hands.onResults(onResults);
console.log('Hands object:', hands); // ← add this
// ── Manual camera loop — no Camera class needed ──
navigator.mediaDevices.getUserMedia({ video: true }).then(stream => {
  video.srcObject = stream;
  video.onloadedmetadata = () => {
    video.play();
    async function loop() {
      resizeCanvas();
      await hands.send({ image: video });
      requestAnimationFrame(loop);
    }
    loop();
  };
}).catch(err => console.error('Webcam error:', err));

function onResults(results) {
  console.log('onResults fired', results.multiHandLandmarks); // ← add this
  ctx.save();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    ctx.restore();
    lastGesture = null;
    return;
  }

  for (const landmarks of results.multiHandLandmarks) {
    drawConnectors(ctx, landmarks, HAND_CONNECTIONS, { color: '#ff4444', lineWidth: 1.5 });
    drawLandmarks(ctx, landmarks, { color: '#ffffff', fillColor: '#ff0000', lineWidth: 1, radius: 3 });
    classifyWithDebounce(landmarks, (gesture) => {
      console.log('Detected:', gesture);
      showGestureLabel(gesture);
      triggerDomainExpansion(gesture);
    });
  }
  ctx.restore();
}

function showGestureLabel(gesture) {
  const label = document.getElementById('gesture-label');
  const names = {
    malevolent_shrine: '呪術廻戦  ·  Malevolent Shrine',
    unlimited_void:    '∞  ·  Unlimited Void',
    chimera_shadow:    '十種影法術  ·  Chimera Shadow Garden',
    time_strike:       '獄門疆  ·  Prison Realm'
  };
  label.textContent = names[gesture] || gesture;
  label.style.opacity = '1';
  clearTimeout(label._timer);
  label._timer = setTimeout(() => label.style.opacity = '0', 3000);
}
</script>
</body>
</html>
